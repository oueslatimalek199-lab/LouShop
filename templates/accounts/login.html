{% extends 'base.html' %}

{% block title %}Connexion - ShopLine{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-form">
        <h1>Connexion</h1>
        <p>Connectez-vous à votre compte ShopLine</p>
        
        <form method="post" class="form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Nom d'utilisateur ou Email</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Mot de passe</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn btn--large btn--primary">Se connecter</button>
        </form>
        
        <p class="auth-footer">
            Vous n'avez pas de compte? <a href="{% url 'signup' %}">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
